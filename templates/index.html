<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>도서 검색</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }
        form {
            text-align: center;
        }
        .results {
            margin-top: 20px;
            width: 80%;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: center; /* Center align text in table headers and cells */
        }
        th {
            background-color: #f2f2f2;
        }
        .left-align {
            text-align: left; /* Left align text in specific column */
        }
    </style>
</head>
<body>
    <h1>도서 검색</h1>
    <form method="POST" action="/search">
        <label for="keywords">키워드:</label>
        <textarea id="keywords" name="keywords" rows="4" cols="50" required></textarea>
        <br><br>
        <label>도서관 선택:</label><br>
        <div id="library-list"></div>
        <br>
        <button type="submit">검색</button>
    </form>
    <br>
    {% if results %}
        <h2>검색 결과</h2>
        <div class="results">{{ results|safe }}</div>
    {% endif %}

    <script>
        // JSON 파일을 읽어오는 함수
        async function fetchLibraryList() {
            const response = await fetch('static/lib_list.json');
            const libList = await response.json();
            createCheckboxes(libList);
        }

        // HTML 요소 생성 함수
        function createCheckboxes(libList) {
            const container = document.getElementById('library-list');
            for (const region in libList) {
                const regionDiv = document.createElement('div');
                const regionTitle = document.createElement('h3');
                regionTitle.textContent = region;
                regionDiv.appendChild(regionTitle);

                // "Select All" checkbox
                const selectAllCheckbox = document.createElement('input');
                selectAllCheckbox.type = 'checkbox';
                selectAllCheckbox.id = `${region}-select-all`;
                selectAllCheckbox.addEventListener('change', (event) => {
                    const checkboxes = regionDiv.querySelectorAll('input[type="checkbox"]');
                    checkboxes.forEach(checkbox => {
                        checkbox.checked = event.target.checked;
                    });
                });

                const selectAllLabel = document.createElement('label');
                selectAllLabel.htmlFor = `${region}-select-all`;
                selectAllLabel.textContent = '전체 선택';

                regionDiv.appendChild(selectAllCheckbox);
                regionDiv.appendChild(selectAllLabel);
                

                const libraries = libList[region];
                for (const library in libraries) {
                    const checkbox = document.createElement('input');
                    checkbox.type = 'checkbox';
                    checkbox.id = libraries[library];
                    checkbox.name = 'libraries';
                    checkbox.value = libraries[library];

                    const label = document.createElement('label');
                    label.htmlFor = libraries[library];
                    label.textContent = library;

                    regionDiv.appendChild(checkbox);
                    regionDiv.appendChild(label);
                    
                }
                container.appendChild(regionDiv);
            }
        }

        // JSON 데이터 가져오기 및 체크박스 생성
        fetchLibraryList();
    </script>
</body>
</html>
